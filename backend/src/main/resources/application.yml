server:
  port: 8080

spring:
  application:
    name: oslpay-merchant-portal

  profiles:
    active: dev

  datasource:
    url: jdbc:mysql://localhost:3306/oslpay_portal?useUnicode=true&characterEncoding=utf-8&serverTimezone=Asia/Shanghai
    username: root
    password: 123456
    driver-class-name: com.mysql.cj.jdbc.Driver
    hikari:
      maximum-pool-size: 20
      minimum-idle: 5
      connection-timeout: 5000       # 等待连接最多 5s，超时立即报错而非无限排队
      idle-timeout: 300000
      max-lifetime: 600000
      leak-detection-threshold: 10000 # 连接泄漏检测：持有超过 10s 打警告

  data:
    redis:
      host: localhost
      port: 6379

  mail:
    host: ${SMTP_HOST:localhost}
    port: ${SMTP_PORT:1025}
    username: ${SMTP_USERNAME:}
    password: ${SMTP_PASSWORD:}
    properties:
      mail:
        smtp:
          auth: ${SMTP_AUTH:false}
          starttls:
            enable: ${SMTP_STARTTLS:false}

# Email sender
email:
  from: ${EMAIL_FROM:noreply@osl-pay.com}
  from-name: ${EMAIL_FROM_NAME:OSL Pay}

# MyBatis-Plus
mybatis-plus:
  configuration:
    map-underscore-to-camel-case: true
    # log-impl: org.apache.ibatis.logging.stdout.StdOutImpl  # DISABLED — stdout SQL logging kills performance under load

# SpringDoc
springdoc:
  api-docs:
    path: /api-docs
  swagger-ui:
    path: /swagger-ui.html

# OSLPay Environment Endpoints
oslpay:
  api:
    production-url: https://openapi.osl-pay.com
    sandbox-url: https://openapitest.osl-pay.com
  mcp:
    production-url: https://mcp.osl-pay.com/sse
    sandbox-url: https://mcptest.osl-pay.com/sse

# JWT
jwt:
  secret: oslpay-merchant-portal-jwt-secret-key-for-dev-only-change-in-production-at-least-256-bits
  access-expire-hours: 2
  refresh-expire-days: 7

# Auth
auth:
  verify-token-expire-minutes: 30
  reset-token-expire-minutes: 30
  login-max-fail-count: 5
  login-lock-minutes: 15
  verify-base-url: http://localhost:3000/verify-email
  reset-base-url: http://localhost:3000/reset-password
